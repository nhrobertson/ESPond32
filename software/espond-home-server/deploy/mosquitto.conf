# Mosquitto config for the ESPond32 project.
# Drop this in /etc/mosquitto/conf.d/espond.conf (do not overwrite mosquitto.conf directly,
# conf.d/*.conf is included automatically by the stock Raspberry Pi OS install).
#
# This listener is for the LAN only (the ESP32 and the home server talk to it over WiFi).
# Do NOT port-forward 1883 — only the home server's web UI (via Caddy, see Caddyfile) should
# be reachable from the internet.

listener 1883
allow_anonymous false
password_file /etc/mosquitto/espond_passwd

persistence true
persistence_location /var/lib/mosquitto/
